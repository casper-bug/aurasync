<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraSync | Admin Command</title>
    
    <!-- Frameworks -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat (Critical for Sandbox Stability) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <style>
        :root { --bg: #050512; --accent: #ff6b6b; --teal: #4ecdc4; --indigo: #a78bfa; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-gradient { background: linear-gradient(135deg, var(--accent), var(--indigo)); transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 107, 107, 0.2); }
        .btn-gradient:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4); }
        .btn-gradient:disabled { opacity: 0.2; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        .input-glow { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); outline: none; transition: 0.2s; }
        .input-glow:focus { border-color: var(--teal); background: rgba(255,255,255,0.1); }
        #player-container { position: relative; width: 100%; padding-top: 56.25%; border-radius: 1.5rem; overflow: hidden; background: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .aurora { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 10% 10%, rgba(255, 107, 107, 0.1) 0%, transparent 40%), radial-gradient(circle at 90% 90%, rgba(78, 205, 196, 0.05) 0%, transparent 40%); }
    </style>
</head>
<body class="min-h-screen">
    <div class="aurora"></div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-6 py-3 rounded-full glass text-[10px] font-bold uppercase tracking-widest transition-all transform -translate-y-32">
        <span id="toast-dot" class="w-2 h-2 rounded-full bg-blue-500"></span>
        <span id="toast-text">Initializing...</span>
    </div>

    <main class="max-w-xl mx-auto px-6 py-8 flex flex-col min-h-screen">
        
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter bg-gradient-to-r from-[#ff6b6b] to-[#a78bfa] bg-clip-text text-transparent">AuraSync</h1>
            <p class="text-[9px] font-bold text-white/20 uppercase tracking-[0.4em] mt-1">Multi-Speaker Command Center</p>
        </header>

        <!-- SETUP VIEW -->
        <div id="view-setup" class="space-y-4">
            <div class="glass p-8 rounded-[40px] space-y-6">
                <div class="space-y-2">
                    <label class="text-[9px] font-bold text-white/40 uppercase tracking-widest px-2">Alphanumeric Room Code</label>
                    <div class="relative">
                        <input type="text" id="code-input" maxlength="6" placeholder="------" class="input-glow w-full py-5 rounded-2xl text-3xl font-black text-center uppercase tracking-widest">
                        <button id="btn-refresh" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/20 hover:text-white/60">
                            <span class="material-icons-round">autorenew</span>
                        </button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-host" disabled class="btn-gradient py-5 rounded-2xl font-black text-xs tracking-widest">HOST</button>
                    <button id="btn-join" disabled class="bg-white/5 hover:bg-white/10 py-5 rounded-2xl font-black text-xs tracking-widest border border-white/10 transition-all">JOIN</button>
                </div>
                <p id="net-status" class="text-center text-[9px] font-bold text-white/20 uppercase">Establishing Secure Connection...</p>
            </div>
        </div>

        <!-- DASHBOARD VIEW -->
        <div id="view-dash" class="hidden space-y-6 animate-in slide-in-from-bottom-8 duration-700">
            <div class="glass p-6 rounded-[32px] space-y-6">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-[9px] font-bold text-white/30 uppercase tracking-widest">Active Room</p>
                        <h2 id="room-display" class="text-2xl font-black tracking-tighter text-white">------</h2>
                    </div>
                    <button id="btn-leave" class="p-2 glass rounded-full text-white/40 hover:text-white transition-all">
                        <span class="material-icons-round text-sm">logout</span>
                    </button>
                </div>

                <div id="player-container">
                    <div id="player"></div>
                </div>

                <div class="px-1">
                    <p class="text-[9px] font-bold text-teal-400 uppercase tracking-widest mb-1">Now Playing</p>
                    <h3 id="current-title" class="text-sm font-bold truncate">Waiting for track...</h3>
                </div>

                <!-- ADMIN COMMANDS -->
                <div id="admin-panel" class="hidden space-y-4 pt-4 border-t border-white/5">
                    <div class="space-y-2">
                        <div class="flex gap-2">
                            <input type="text" id="yt-url" placeholder="Paste YouTube link here..." class="flex-1 input-glow py-3 px-4 rounded-xl text-xs">
                            <button id="btn-add-track" class="bg-teal-500 hover:bg-teal-400 p-3 rounded-xl transition-all">
                                <span class="material-icons-round text-white">add</span>
                            </button>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-play-pause" class="flex-1 bg-white/10 hover:bg-white/20 py-3 rounded-xl font-bold text-[10px] flex items-center justify-center gap-2">
                            <span class="material-icons-round text-sm">play_pause</span> PLAY / PAUSE
                        </button>
                        <button id="btn-next" class="bg-white/10 hover:bg-white/20 px-6 rounded-xl transition-all">
                            <span class="material-icons-round text-sm">skip_next</span>
                        </button>
                    </div>
                </div>

                <!-- GUEST COMMANDS -->
                <div id="guest-panel" class="hidden space-y-3">
                    <button id="btn-join-audio" class="w-full btn-gradient py-4 rounded-2xl font-black text-xs tracking-widest">START LISTENING</button>
                    <button id="btn-nudge" class="w-full bg-white/5 py-3 rounded-xl text-[10px] font-bold flex items-center justify-center gap-2 border border-white/5">
                        <span class="material-icons-round text-xs">shutter_speed</span> MANUAL NUDGE (RESYNC)
                    </button>
                </div>
            </div>

            <!-- PLAYLIST -->
            <div class="glass p-6 rounded-[32px] space-y-4">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-white/30">Up Next</h3>
                <div id="queue-list" class="space-y-2 max-h-72 overflow-y-auto pr-1"></div>
            </div>
        </div>
    </main>

    <script>
        // Use Compat Global Objects to prevent ESM module scoping issues in sandboxes
        const config = {
            apiKey:            'AIzaSyAvdsISdxERqIrZbyecvwKsf2V7lFuPWkc',
            authDomain:        'zync-2baf2.firebaseapp.com',
            projectId:         'zync-2baf2',
            storageBucket:     'zync-2baf2.appspot.com',
            messagingSenderId: '388386446447',
            appId:             '1:388386446447:web:9659826f61a4aaec01019a'
        };

        firebase.initializeApp(config);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const artifactId = 'aura-sync-v3';

        let user = null;
        let roomCode = "";
        let isHost = false;
        let ytPlayer = null;
        let masterState = { videoId: '', playing: false, currentTime: 0, queue: [] };
        let hostSyncIntervalId = null;
        let guestResyncIntervalId = null;
        let lastGuestStateSyncAt = 0;
        const SYNC_PUSH_INTERVAL_MS = 2000;
        const SYNC_DRIFT_THRESHOLD_SEC = 1.0;
        const STATE_SYNC_COOLDOWN_MS = 800;
        const makeQueueId = () => {
            if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
            if (window.crypto && crypto.getRandomValues) {
                const bytes = new Uint8Array(16);
                crypto.getRandomValues(bytes);
                return `${Date.now()}-${Array.from(bytes, b => b.toString(16).padStart(2, '0')).join('')}`;
            }
            return `${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
        };

        const toast = (msg, mode = 'info') => {
            const el = document.getElementById('toast');
            const txt = document.getElementById('toast-text');
            const dot = document.getElementById('toast-dot');
            txt.innerText = msg;
            dot.className = `w-2 h-2 rounded-full ${mode === 'success' ? 'bg-green-500' : mode === 'error' ? 'bg-rose-500' : 'bg-blue-500'}`;
            el.style.transform = 'translate(-50%, 0)';
            setTimeout(() => { el.style.transform = 'translate(-50%, -128px)'; }, 3000);
        };

        // --- AUTH & INIT ---
        auth.signInAnonymously().then(cred => {
            user = cred.user;
            document.getElementById('btn-host').disabled = false;
            document.getElementById('btn-join').disabled = false;
            document.getElementById('net-status').innerText = "Connected to Aura Network";
            document.getElementById('net-status').style.color = "#4ecdc4";
            toast("System Online", "success");
        });

        const genCode = () => {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let res = '';
            for(let i=0; i<6; i++) res += chars.charAt(Math.floor(Math.random() * chars.length));
            document.getElementById('code-input').value = res;
        };

        document.getElementById('btn-refresh').onclick = genCode;
        document.getElementById('btn-host').onclick = () => entry(true);
        document.getElementById('btn-join').onclick = () => entry(false);
        document.getElementById('btn-leave').onclick = () => location.reload();

        async function entry(hostMode) {
            roomCode = document.getElementById('code-input').value.trim().toUpperCase();
            if (roomCode.length < 3) return toast("Enter valid code", "error");

            isHost = hostMode;
            // Matches: /artifacts/{appId}/public/data/{roomName}
            const roomRef = db.collection('artifacts').doc(artifactId).collection('public').doc('data').collection(roomCode).doc('master');

            try {
                const snap = await roomRef.get();
                if (isHost) {
                    await roomRef.set({
                        hostId: user.uid,
                        videoId: 'dQw4w9WgXcQ',
                        playing: false,
                        currentTime: 0,
                        queue: [],
                        lastSync: Date.now()
                    });
                } else if (!snap.exists) {
                    return toast("Room Not Found", "error");
                }

                document.getElementById('view-setup').classList.add('hidden');
                document.getElementById('view-dash').classList.remove('hidden');
                document.getElementById('room-display').innerText = roomCode;

                if (isHost) document.getElementById('admin-panel').classList.remove('hidden');
                else document.getElementById('guest-panel').classList.remove('hidden');

                initYT();
                startSync();
            } catch (e) {
                console.error(e);
                toast("Permission Denied", "error");
            }
        }

        // --- YOUTUBE ENGINE ---
        function initYT() {
            window.onYouTubeIframeAPIReady = () => {
                ytPlayer = new YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: 'dQw4w9WgXcQ',
                    playerVars: { 'autoplay': 0, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0, 'playsinline': 1 },
                    events: {
                        'onReady': () => {
                            if (isHost) {
                                if (hostSyncIntervalId) clearInterval(hostSyncIntervalId);
                                hostSyncIntervalId = setInterval(pushSync, SYNC_PUSH_INTERVAL_MS);
                            } else {
                                if (guestResyncIntervalId) clearInterval(guestResyncIntervalId);
                                guestResyncIntervalId = setInterval(() => syncGuestPlayback(false), SYNC_PUSH_INTERVAL_MS);
                                syncGuestPlayback(true);
                            }
                        },
                        'onStateChange': (event) => {
                            if (isHost) return;
                            if (event.data !== YT.PlayerState.PLAYING && event.data !== YT.PlayerState.PAUSED) return;
                            const now = Date.now();
                            if (now - lastGuestStateSyncAt < STATE_SYNC_COOLDOWN_MS) return;
                            lastGuestStateSyncAt = now;
                            syncGuestPlayback(false);
                        }
                    }
                });
            };
            if (window.YT && window.YT.Player) onYouTubeIframeAPIReady();
        }

        const parseID = (url) => {
            const regex = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
            const match = url.match(regex);
            return (match && match[7] && match[7].length === 11) ? match[7] : false;
        };

        const fetchMeta = async (vid) => {
            try {
                const res = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${vid}`);
                if (!res.ok) throw new Error(`Metadata request failed: ${res.status}`);
                const d = await res.json();
                return d.title || "YouTube Track";
            } catch (err) {
                console.warn("Metadata fetch failed", err);
                return "YouTube Track";
            }
        };

        // --- ADMIN ACTIONS ---
        document.getElementById('btn-add-track').onclick = async () => {
            const url = document.getElementById('yt-url').value.trim();
            const vid = parseID(url);
            if (!vid) return toast("Invalid YouTube Link", "error");

            toast("Resolving metadata...", "info");
            const title = await fetchMeta(vid);
            const roomRef = db.collection('artifacts').doc(artifactId).collection('public').doc('data').collection(roomCode).doc('master');
            
            await roomRef.update({
                queue: firebase.firestore.FieldValue.arrayUnion({ id: makeQueueId(), videoId: vid, title: title })
            });
            document.getElementById('yt-url').value = "";
            toast("Track added", "success");
        };

        document.getElementById('btn-play-pause').onclick = async () => {
            if (!isHost) return;
            const roomRef = db.collection('artifacts').doc(artifactId).collection('public').doc('data').collection(roomCode).doc('master');
            await roomRef.update({
                playing: !masterState.playing,
                currentTime: ytPlayer.getCurrentTime(),
                lastSync: Date.now()
            });
        };

        document.getElementById('btn-next').onclick = async () => {
            if (!isHost || masterState.queue.length === 0) return;
            const next = masterState.queue[0];
            const newQ = [...masterState.queue].slice(1);
            const roomRef = db.collection('artifacts').doc(artifactId).collection('public').doc('data').collection(roomCode).doc('master');
            await roomRef.update({
                videoId: next.videoId,
                queue: newQ,
                currentTime: 0,
                playing: true,
                lastSync: Date.now()
            });
        };

        window.moveItem = async (idx, act) => {
            if (!isHost) return;
            let q = [...masterState.queue];
            if (act === 'up' && idx > 0) [q[idx], q[idx-1]] = [q[idx-1], q[idx]];
            else if (act === 'del') q.splice(idx, 1);
            
            const roomRef = db.collection('artifacts').doc(artifactId).collection('public').doc('data').collection(roomCode).doc('master');
            await roomRef.update({ queue: q });
        };

        // --- SYNC CORE ---
        async function pushSync() {
            if (!isHost || !ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
            const roomRef = db.collection('artifacts').doc(artifactId).collection('public').doc('data').collection(roomCode).doc('master');
            await roomRef.update({
                currentTime: ytPlayer.getCurrentTime(),
                lastSync: Date.now()
            });
        }

        function getTargetTime(state) {
            if (!state || typeof state.currentTime !== 'number') return 0;
            const lag = Math.max(0, (Date.now() - (state.lastSync || Date.now())) / 1000);
            const target = state.currentTime + (state.playing ? lag : 0);
            return Math.max(0, target);
        }

        function syncGuestPlayback(forceSeek) {
            if (isHost || !ytPlayer || !masterState || typeof ytPlayer.getCurrentTime !== 'function') return;
            const target = getTargetTime(masterState);
            if (forceSeek || Math.abs(ytPlayer.getCurrentTime() - target) > SYNC_DRIFT_THRESHOLD_SEC) {
                ytPlayer.seekTo(target, true);
            }
        }

        function startSync() {
            const roomRef = db.collection('artifacts').doc(artifactId).collection('public').doc('data').collection(roomCode).doc('master');
            roomRef.onSnapshot(async snap => {
                const data = snap.data();
                if (!data) return;
                const oldVid = masterState.videoId;
                masterState = data;

                renderQueue(data.queue);

                if (!ytPlayer) return;

                if (oldVid !== data.videoId) {
                    ytPlayer.loadVideoById(data.videoId);
                    const title = await fetchMeta(data.videoId);
                    document.getElementById('current-title').innerText = title;
                }

                const state = typeof ytPlayer.getPlayerState === 'function' ? ytPlayer.getPlayerState() : null;
                if (data.playing) {
                    if (state !== YT.PlayerState.PLAYING) ytPlayer.playVideo();
                } else if (state !== YT.PlayerState.PAUSED && state !== YT.PlayerState.ENDED) {
                    ytPlayer.pauseVideo();
                }

                if (!isHost) {
                    syncGuestPlayback(oldVid !== data.videoId);
                }
            });
        }

        document.getElementById('btn-nudge').onclick = () => {
            if (!masterState || !ytPlayer) return;
            const target = getTargetTime(masterState);
            ytPlayer.seekTo(target, true);
            toast("Manual Sync Applied", "success");
        };

        document.getElementById('btn-join-audio').onclick = () => {
            if (!ytPlayer) return;
            ytPlayer.playVideo();
            ytPlayer.mute();
            setTimeout(() => {
                ytPlayer.unMute();
                document.getElementById('btn-join-audio').innerText = "CONNECTED";
                document.getElementById('btn-join-audio').disabled = true;
                document.getElementById('btn-join-audio').classList.add('opacity-40');
            }, 500);
        };

        function renderQueue(q) {
            const list = document.getElementById('queue-list');
            if (!q || q.length === 0) {
                list.innerHTML = `<p class="text-center text-[10px] text-white/10 py-10 italic">Queue is empty</p>`;
                return;
            }
            list.innerHTML = q.map((item, idx) => `
                <div class="flex items-center gap-3 p-3 glass rounded-2xl border border-white/5 animate-in slide-in-from-right-2">
                    <img src="https://img.youtube.com/vi/${item.videoId}/default.jpg" class="w-12 h-9 rounded-xl object-cover">
                    <div class="flex-1 min-w-0">
                        <p class="text-[10px] font-bold truncate">${item.title}</p>
                    </div>
                    ${isHost ? `
                        <div class="flex gap-2">
                            <button onclick="moveItem(${idx}, 'up')" class="hover:text-teal-400"><span class="material-icons-round text-xs">arrow_upward</span></button>
                            <button onclick="moveItem(${idx}, 'del')" class="hover:text-rose-400"><span class="material-icons-round text-xs">close</span></button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

    </script>
</body>
</html>
